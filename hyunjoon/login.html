<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - YAMY</title>
    <link rel="stylesheet" href="./assets/css/common.css" />
    <link rel="stylesheet" href="./assets/css/auth.css" />
  </head>
  <body>
    <div class="container auth-page">
      <div id="header">
        <a href="index.html" class="title-link"><h1>YAMY 🍳</h1></a>
        <p>맛있는 요리의 시작, 간단한 레시피로 누구나 요리 마스터!</p>
      </div>

      <main class="auth-main">
        <section class="auth-card section">
          <div class="auth-switch" aria-label="인증 페이지 선택">
            <a href="login.html" class="switch-link active">로그인</a>
            <a href="signup.html" class="switch-link">회원가입</a>
          </div>

          <h2>다시 만나서 반가워요!</h2>
          <p class="auth-description">즐겨찾는 레시피를 저장하고, 나만의 요리 리스트를 관리해보세요.</p>

          <form class="auth-form" action="#" method="post">
            <label for="login-email">이메일</label>
            <input id="login-email" name="email" type="email" placeholder="example@yamy.com" required />

            <label for="login-password">비밀번호</label>
            <input id="login-password" name="password" type="password" placeholder="비밀번호를 입력해주세요" required />

            <div class="auth-options">
              <label class="checkbox-label" for="remember-me">
                <input id="remember-me" name="remember" type="checkbox" />
                로그인 상태 유지
              </label>
              <a href="#">비밀번호 찾기</a>
            </div>

            <button type="submit" class="auth-submit">로그인하기</button>
          </form>

          <p class="auth-help">
            아직 계정이 없나요?
            <a href="signup.html">회원가입 하러 가기</a>
          </p>
        </section>
      </main>
    </div>
  </body>
</html>
