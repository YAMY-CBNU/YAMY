<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 - YAMY</title>
    <link rel="stylesheet" href="./assets/css/common.css" />
    <link rel="stylesheet" href="./assets/css/auth.css" />
  </head>
  <body>
    <div class="container auth-page">
      <div id="header">
        <a href="index.html" class="title-link"><h1>YAMY 🍳</h1></a>
        <p>맛있는 요리의 시작, 간단한 레시피로 누구나 요리 마스터!</p>
      </div>

      <main class="auth-main">
        <section class="auth-card section">
          <div class="auth-switch" aria-label="인증 페이지 선택">
            <a href="login.html" class="switch-link">로그인</a>
            <a href="signup.html" class="switch-link active">회원가입</a>
          </div>

          <h2>YAMY와 함께 시작해요!</h2>
          <p class="auth-description">3초 가입으로 레시피 추천과 요리 기록 기능을 바로 이용할 수 있어요.</p>

          <form class="auth-form" action="#" method="post">
            <label for="signup-name">닉네임</label>
            <input id="signup-name" name="name" type="text" placeholder="표시될 닉네임" required />

            <label for="signup-email">이메일</label>
            <input id="signup-email" name="email" type="email" placeholder="example@yamy.com" required />

            <label for="signup-password">비밀번호</label>
            <input id="signup-password" name="password" type="password" placeholder="8자 이상 입력" minlength="8" required />

            <label for="signup-password-confirm">비밀번호 확인</label>
            <input
              id="signup-password-confirm"
              name="passwordConfirm"
              type="password"
              placeholder="비밀번호를 다시 입력해주세요"
              minlength="8"
              required
            />

            <label class="checkbox-label" for="agree-terms">
              <input id="agree-terms" name="agree" type="checkbox" required />
              이용약관 및 개인정보 수집에 동의합니다.
            </label>

            <button type="submit" class="auth-submit">회원가입 완료</button>
          </form>

          <p class="auth-help">
            이미 계정이 있나요?
            <a href="login.html">로그인 하러 가기</a>
          </p>
        </section>
      </main>
    </div>
  </body>
</html>
